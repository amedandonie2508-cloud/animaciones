<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign Up</title>

    <link rel="stylesheet" href="css/miestilo.css" type="text/css" />
    <link rel="stylesheet" href="css/bootstrap.css" type="text/css" />
  </head>

  <body class="body_login">
    <header></header>
    <main>
      <section class="pull-to-refresh">
        <div class="spinner-border" role="status"></div>
      </section>

      <section class="logos">
        <div>
          <img src="img/Drive-Up Logo 1 (1).png" alt="" />
        </div>
      </section>
      <section class="card_signup">
        <div class="card-signup">
          <div class="field-group">
            <label class="field-label" for="user-email">User Or Email</label>
            <input
              class="field-input"
              type="text"
              id="user-email"
              placeholder="Enter your username or email"
            />
          </div>

          <div class="field-group">
            <label class="field-label" for="password">Password</label>
            <input
              class="field-input"
              type="password"
              id="password"
              placeholder="Enter your password"
            />
          </div>

          <div class="field-group">
            <label class="field-label" for="confirm-password"
              >Confirm Password</label
            >
            <input
              class="field-input"
              type="password"
              id="confirm-password"
              placeholder="Confirm your password"
            />
          </div>

          <button class="btn-signup" onclick="window.location.href='Login.html'">Sign Up</button>

          <div class="divider">OR</div>

          <button class="btn-google">
            Sign Up With Google
            <svg class="google-icon" viewBox="0 0 48 48">
              <path
                fill="#FFC107"
                d="M43.6 20.1H42V20H24v8h11.3C33.7 32.6 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34.5 6.5 29.5 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"
              />
              <path
                fill="#FF3D00"
                d="M6.3 14.7l6.6 4.8C14.7 16 19 13 24 13c3.1 0 5.8 1.2 7.9 3.1l5.7-5.7C34.5 6.5 29.5 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"
              />
              <path
                fill="#4CAF50"
                d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.4 35.4 26.8 36 24 36c-5.2 0-9.7-3.3-11.3-8H6.3C9.6 35.6 16.2 44 24 44z"
              />
              <path
                fill="#1976D2"
                d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.2 5.6l6.2 5.2C37 39.2 44 34 44 24c0-1.3-.1-2.6-.4-3.9z"
              />
            </svg>
          </button>
          <a href="Acces.html">
            <button class="btn-back">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M19 12H5M12 5l-7 7 7 7" />
              </svg>
            </button>
          </a>
        </div>
      </section>
    </main>
    <footer></footer>

    <script src="js/bootstrap.bundle.min.js" type="script"></script>
    <script
      src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.14/dist/dotlottie-wc.js"
      type="module"
    ></script>
    <script>
      const pullToRefresh = document.querySelector(".pull-to-refresh");
      let touchstartY = 0;
      document.addEventListener("touchstart", (e) => {
        touchstartY = e.touches[0].clientY;
      });
      document.addEventListener("touchmove", (e) => {
        const touchY = e.touches[0].clientY;
        const touchDiff = touchY - touchstartY;
        if (touchDiff > 0 && window.scrollY === 0) {
          pullToRefresh.classList.add("seen");
          e.preventDefault();
        }
      });
      document.addEventListener("touchend", (e) => {
        if (pullToRefresh.classList.contains("seen")) {
          pullToRefresh.classList.remove("seen");
          location.reload();
        }
      });
    </script>
  </body>
</html>
