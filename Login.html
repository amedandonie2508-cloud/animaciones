<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styleLogin.css" />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div>
  <div class="driveuplogo">
    <img src="img/DriveUpLogo.png" alt="DriveUp Logo" class="logo" />
  </div>
  <div class="login-container">
    <h2 class="tittle">User Or Email</h2>
    <input type="text" class="input-blue" placeholder="User Or Email" />

    <h2 class="tittle">Password</h2>
    <div class="password-wrapper">
      <input type="password" id="passwordInput" class="input-blue" placeholder="Password" />
      <span id="togglePassword">OJO</span>
    </div>

    <div class="forgot">
      <a href="restaurar.html">Forgot Password</a>
    </div>

    <button class="LoginButton" id="loginBtn">Login</button>

    <div class="Mini">OR</div>

    <button class="GoogleLogin" id="googleBtn">
      <img src="img/googleicon.webp" alt="Google" class="google-icon" />
      Login With Google
    </button>

    <div class="back-btn">
      <button type="button" id="backButton">&larr;</button>
    </div>
  </div>
</div>

<script>
  const toggleBtn = document.getElementById("togglePassword");
  const passwordInput = document.getElementById("passwordInput");

  toggleBtn.addEventListener("click", () => {
    const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
    passwordInput.setAttribute("type", type);
  });

  const backButton = document.getElementById("backButton");
  backButton.addEventListener("click", () => {
    window.location.href = "Acces.html";
  });

  const loginBtn = document.getElementById("loginBtn");
  loginBtn.addEventListener("click", () => {
    window.location.href = "home.html";
  });

  const googleBtn = document.getElementById("googleBtn");
  googleBtn.addEventListener("click", () => {
    window.location.href = "alternate-google.html";
  });
</script>
</body>
</html>
