<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacts</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styleChats.css" />
  <link rel="stylesheet" href="css/miestilo.css" type="text/css" />
</head>
<body>
 <div class="body_perfil">
  <div class="contacts-title-box">
    <h2 class="contacts-title">Chats</h2>
  </div>

  <div class="contacts-container">
    <div class="contact-list">
      <button class="contact-btn" onclick="openChat('alice-chat.html')">
        <img src="img/alice.jpg" alt="Alice" class="contact-pic" />
        <span class="contact-name">Alice</span>
      </button>

      <button class="contact-btn" onclick="openChat('bob-chat.html')">
        <img src="img/bob.jpg" alt="Bob" class="contact-pic" />
        <span class="contact-name">Bob</span>
      </button>

      <button class="contact-btn" onclick="openChat('charlie-chat.html')">
        <img src="img/charlie.jpg" alt="Charlie" class="contact-pic" />
        <span class="contact-name">Charlie</span>
      </button>
    </div>

    <!-- Botón back -->
    <a href="home.html">
      <button class="btn-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
      </button>
    </a>

</div>
  
 </div>
  <script>
    function openChat(page) {
      window.location.href = page;
    }
  </script>
</body>
</html>
